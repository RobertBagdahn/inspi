{% load component_tags %}
<div class="rounded-xl border border-gray-100 bg-white p-5 sm:p-6 text-center flex flex-col items-center shadow-md hover:shadow-lg transition-shadow duration-300">
    <div class="mb-3 flex h-14 w-14 items-center justify-center rounded-full bg-{{ color }}-50 ring-4 ring-{{ color }}-100">
        <svg class="w-7 h-7 text-{{ color }}-600"
             aria-hidden="true"
             xmlns="http://www.w3.org/2000/svg"
             width="24"
             height="24"
             fill="none"
             viewBox="0 0 24 24">
            {% component "icon" icon=icon %} {% endcomponent %}
        </svg>
    </div>
    <h3 class="text-gray-600 text-sm mb-3">{{ description }}</h3>
    <a href="{{ link }}"
       class="inline-flex items-center gap-2 bg-{{ color }}-600 hover:bg-{{ color }}-700 text-white font-semibold py-2.5 px-5 rounded-lg transition-colors duration-200 text-sm shadow-sm hover:shadow">
        {{ text }}
    </a>
</div>
