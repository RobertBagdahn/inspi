{% load component_tags %}
<button type="submit"
        class="inline-flex items-center justify-center gap-2 rounded-lg bg-{{ color }}-600 px-5 py-3 text-center text-sm font-semibold text-white shadow-sm hover:bg-{{ color }}-700 hover:shadow transition-all duration-200 focus:ring-4 focus:ring-{{ color }}-300">
    <span class="opacity-90">{% component "icon" icon=icon %} {% endcomponent %}</span>
    {{ text }}
</button>
