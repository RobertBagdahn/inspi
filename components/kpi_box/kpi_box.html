{% load component_tags %}
<div class="col-span-1 rounded-xl border border-gray-100 bg-white p-6 shadow-md hover:shadow-lg transition-shadow duration-300">
    <div class="mb-3 flex h-12 w-12 items-center justify-center rounded-xl bg-{{ color }}-50 ring-2 ring-{{ color }}-100">
        <svg class="h-6 w-6 text-{{ color }}-600"
             aria-hidden="true"
             xmlns="http://www.w3.org/2000/svg"
             width="24"
             height="24"
             fill="none"
             viewBox="0 0 24 24">
            {% component "icon" icon=icon %} {% endcomponent %}
        </svg>
    </div>
    <div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">{{ kpi_value }}</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">{{ kpi_description }}</p>
    </div>
    {% if link %}
    <div class="mt-4">
        <a href="{{ link }}"
           class="inline-flex items-center gap-1 text-sm font-medium text-{{ color }}-600 hover:text-{{ color }}-800 transition-colors duration-200">
            {{ link_text }}
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </a>
    </div>
    {% endif %}
</div>
